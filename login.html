<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f2f4f7;
            font-family:Arial;
        }
        .login-box{
            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            text-align:center;
        }
        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            box-sizing:border-box;
        }
        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>IT-helpdesk System Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>

        if (!localStorage.getItem("users")) {
    localStorage.setItem("users", JSON.stringify([
        {
            username: "admin",
            password: "admin123",
            role: "admin",
            department: "ALL"
        },
        {
            username: "hr",
            password: "123",
            role: "user",
            department: "HR"
        },
        {
            username: "reception",
            password: "123",
            role: "user",
            department: "Reception"
        }
    ]));
}


function login(){

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(x =>
        x.username === username &&
        x.password === password
    );

    if(user){
        localStorage.setItem("currentUser", JSON.stringify(user));
        window.location.href = "index.html";
    }else{
        alert("Invalid Login");
    }
}
</script>

</body>
</html>
